<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BAC Padel Tournament Standings</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }
    
        h1 {
            text-align: center;
        }
    
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
    
        /* HEADERS */
        th {
            padding: 12px;
            text-align: center;
            border-bottom: 2px solid #333;
            background: #f2f2f2;
        }
    
        /* CELLS */
        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }
    
        /* REMOVE VERTICAL LINES COMPLETELY */
        th, td {
            border-left: none;
            border-right: none;
        }
    
        tr:nth-child(even) td {
            background: #fafafa;
        }
    </style>
</head>

<body>

<h1>BAC Padel Tournament Standings</h1>

<table>
    <thead id="table-head"></thead>
    <tbody id="table-body"></tbody>
</table>

<script>

const csvUrl =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vR8WpN2tZ7Gjb6UySW6DcER-MXEFOPLshLXYkbK0p9phKyGDRWnxivJePyo5RVIvTRehLuIoY7QP6BR/pub?gid=0&single=true&output=csv";

fetch(csvUrl)
.then(response => response.text())
.then(data => {

    const rows = data.trim().split("\n").map(r => r.split(","));

    const headers = rows[0];
    const bodyRows = rows.slice(1);

    // Build header
    const head = document.getElementById("table-head");
    const headRow = document.createElement("tr");

    headers.forEach(h => {
        const th = document.createElement("th");
        th.textContent = h;
        headRow.appendChild(th);
    });

    head.appendChild(headRow);

    // Build body
    const body = document.getElementById("table-body");

    bodyRows.forEach(row => {
        const tr = document.createElement("tr");

        row.forEach(cell => {
            const td = document.createElement("td");
            td.textContent = cell;
            tr.appendChild(td);
        });

        body.appendChild(tr);
    });

});

</script>

</body>
</html>
