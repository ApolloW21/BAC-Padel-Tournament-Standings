<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        tr:nth-child(even) {
            background-color: #fafafa;
        }

        .rank {
            width: 60px;
            text-align: center;
        }

        .score {
            text-align: right;
        }
    </style>
</head>

<body>

<h1>Leaderboard</h1>

<table>
    <thead>
        <tr>
            <th class="rank">Rank</th>
            <th>Name</th>
            <th>Score</th>
        </tr>
    </thead>
    <tbody id="leaderboard"></tbody>
</table>

<script>

const csvUrl =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vR8WpN2tZ7Gjb6UySW6DcER-MXEFOPLshLXYkbK0p9phKyGDRWnxivJePyo5RVIvTRehLuIoY7QP6BR/pub?gid=0&single=true&output=csv";

fetch(csvUrl)
.then(response => response.text())
.then(data => {

    const rows = data.trim().split("\n").slice(1);

    const players = rows.map(row => {

        const cols = row.split(",");

        return {
            name: cols[0],
            score: Number(cols[1])
        };
    });

    players.sort((a, b) => b.score - a.score);

    const tbody = document.getElementById("leaderboard");

    players.forEach((player, index) => {

        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td class="rank">${index + 1}</td>
            <td>${player.name}</td>
            <td class="score">${player.score}</td>
        `;

        tbody.appendChild(tr);
    });
});

</script>

</body>
</html>
