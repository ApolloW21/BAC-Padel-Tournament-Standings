<script>

const csvUrl =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vR8WpN2tZ7Gjb6UySW6DcER-MXEFOPLshLXYkbK0p9phKyGDRWnxivJePyo5RVIvTRehLuIoY7QP6BR/pub?gid=0&single=true&output=csv";

fetch(csvUrl)
  .then(response => response.text())
  .then(data => {

    const rows = data.trim().split("\n").filter(r => r);

    const tableHead = document.querySelector("thead");
    const tableBody = document.getElementById("leaderboard");

    // Clear any existing content
    tableHead.innerHTML = "";
    tableBody.innerHTML = "";

    // Split headers (first row)
    const headers = rows[0].split(",");

    // Build header row
    const headerRow = document.createElement("tr");

    headers.forEach(h => {
      const th = document.createElement("th");
      th.textContent = h.trim();
      headerRow.appendChild(th);
    });

    tableHead.appendChild(headerRow);

    // Build data rows
    rows.slice(1).forEach(row => {

      const cols = row.split(",");

      const tr = document.createElement("tr");

      cols.forEach(col => {
        const td = document.createElement("td");
        td.textContent = col.trim();
        tr.appendChild(td);
      });

      tableBody.appendChild(tr);
    });

  })
  .catch(error => {
    console.error("Error loading leaderboard:", error);
  });

</script>
