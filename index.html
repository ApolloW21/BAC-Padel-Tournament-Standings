<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BAC Padel Tournament Standings</title>

    <style>
    
        body {
            font-family: Arial, sans-serif;
            background: #09090b;
            color: white;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }
    
        .container {
            width: 100%;
            max-width: 900px;
        }
    
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 36px;
            color: #00e5ff;
    
            text-shadow:
                0 0 10px rgba(0,229,255,0.8),
                0 0 25px rgba(0,229,255,0.5);
        }
    
        .leaderboard {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
    
        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
    
            background: #111827;
    
            padding: 16px;
            border-radius: 12px;
    
            border: 1px solid rgba(0,255,255,0.15);
    
            box-shadow:
                0 0 10px rgba(0,255,255,0.05),
                0 0 20px rgba(0,255,255,0.03);
    
            text-align: center;
            align-items: center;
            position: relative;
    
            opacity: 0;
            transform: translateY(20px);
    
            transition:
                transform 0.2s ease,
                box-shadow 0.2s ease,
                border-color 0.2s ease;
        }
    
        .row:hover {
    
            transform: translateY(-4px);
    
            border-color: rgba(0,255,255,0.5);
    
            box-shadow:
                0 0 15px rgba(0,255,255,0.2),
                0 0 35px rgba(0,255,255,0.1);
        }
    
        .header {
            background: #00e5ff;
            color: black;
            font-weight: bold;
    
            box-shadow:
                0 0 15px rgba(0,229,255,0.5),
                0 0 35px rgba(0,229,255,0.3);
        }
    
        .top1::before,
        .top2::before,
        .top3::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 6px;
            border-radius: 12px 0 0 12px;
        }
    
        .top1::before {
            background: #ffd700;
            box-shadow: 0 0 12px #ffd700;
        }
    
        .top2::before {
            background: #c0c0c0;
            box-shadow: 0 0 12px #c0c0c0;
        }
    
        .top3::before {
            background: #cd7f32;
            box-shadow: 0 0 12px #cd7f32;
        }
    
        .points {
            font-weight: bold;
            color: #00e5ff;
        }
    
        .diff {
            font-weight: bold;
        }
    
        .positive {
            color: #39ff14;
    
            text-shadow:
                0 0 8px rgba(57,255,20,0.6);
        }
    
        .negative {
            color: #ff3b5c;
    
            text-shadow:
                0 0 8px rgba(255,59,92,0.6);
        }
    
        .neutral {
            color: white;
        }
    
        .zone-title {
    
            margin-top: 10px;
            padding: 14px;
    
            text-align: center;
            font-weight: bold;
    
            border-radius: 12px;
    
            background: rgba(255,59,92,0.12);
    
            color: #ff3b5c;
    
            border: 1px solid rgba(255,59,92,0.4);
    
            box-shadow:
                0 0 15px rgba(255,59,92,0.15);
        }
    
        .elim {
    
            background: #1a1015;
    
            border-color: rgba(255,59,92,0.35);
    
            box-shadow:
                0 0 10px rgba(255,59,92,0.08);
        }
    
        /* WATERFALL ANIMATION */
    
        .row,
        .zone-title {
            opacity: 0;
            transform: translateY(20px);
        }
    
        .animate-in {
            animation: cardAppear 0.6s ease forwards;
        }
    
        @keyframes cardAppear {
    
            from {
                opacity: 0;
                transform: translateY(20px);
            }
    
            to {
                opacity: 1;
                transform: translateY(0);
            }
    
        }
    
    </style>
</head>

<body>

<div class="container">

    <h1>🏆 BAC Padel Tournament Standings</h1>

    <div id="main" class="leaderboard"></div>

    <div id="elim-zone" class="leaderboard"></div>

</div>

<script>

const baseUrl =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vR8WpN2tZ7Gjb6UySW6DcER-MXEFOPLshLXYkbK0p9phKyGDRWnxivJePyo5RVIvTRehLuIoY7QP6BR/pub?gid=0&single=true&output=csv";

const csvUrl = baseUrl + "&_=" + Date.now();

function animateValue(element, target, isDiff = false) {

    const duration = 800;
    const startTime = performance.now();

    function update(currentTime) {

        const progress = Math.min((currentTime - startTime) / duration, 1);

        let current = Math.round(target * progress);

        if (isDiff) {

            if (current > 0) {
                element.textContent = "+" + current;
            }
            else {
                element.textContent = current;
            }

        }
        else {
            element.textContent = current;
        }

        if (progress < 1) {
            requestAnimationFrame(update);
        }

    }

    requestAnimationFrame(update);
}

function animateWaterfall() {

    const items = document.querySelectorAll(".row, .zone-title");

    items.forEach((item, index) => {

        setTimeout(() => {

            item.classList.add("animate-in");

            const animatedCells = item.querySelectorAll("[data-target]");

            animatedCells.forEach(cell => {

                const target = Number(cell.dataset.target);
                const isDiff = cell.dataset.diff === "true";

                animateValue(cell, target, isDiff);

            });

        }, index * 120);

    });

}
    
fetch(csvUrl, { cache: "no-store" })
.then(response => response.text())
.then(data => {

    const rows = data.trim().split("\n").map(r => r.split(","));

    const headers = ["Place", ...rows[0].slice(1)];
    const bodyRows = rows.slice(1);

    bodyRows.sort((a, b) => {

        const pointDiff = Number(b[3]) - Number(a[3]);

        if (pointDiff !== 0) {
            return pointDiff;
        }

        return Number(b[4]) - Number(a[4]);

    });

    const main = document.getElementById("main");
    const elimZone = document.getElementById("elim-zone");

    const headerRow = document.createElement("div");
    headerRow.className = "row header";

    headers.forEach(header => {

        const div = document.createElement("div");
        div.textContent = header;
        headerRow.appendChild(div);

    });

    main.appendChild(headerRow);


    const renderedRows = [];

    let rank = 1;

    for (let i = 0; i < bodyRows.length; i++) {

        const row = bodyRows[i];

        if (i > 0) {

            const previous = bodyRows[i - 1];

            const tied =
                Number(row[3]) === Number(previous[3]) &&
                Number(row[4]) === Number(previous[4]);

            if (!tied) {
                rank = i + 1;
            }
        }

        const previousTie =
            i > 0 &&
            Number(row[3]) === Number(bodyRows[i - 1][3]) &&
            Number(row[4]) === Number(bodyRows[i - 1][4]);

        const nextTie =
            i < bodyRows.length - 1 &&
            Number(row[3]) === Number(bodyRows[i + 1][3]) &&
            Number(row[4]) === Number(bodyRows[i + 1][4]);

        const rankLabel =
            (previousTie || nextTie)
                ? "=" + rank
                : rank;

        const rowDiv = document.createElement("div");
        rowDiv.className = "row";

        if (rank === 1) rowDiv.classList.add("top1");
        if (rank === 2) rowDiv.classList.add("top2");
        if (rank === 3) rowDiv.classList.add("top3");

        const displayRow = [rankLabel, ...row.slice(1)];

        displayRow.forEach((cell, columnIndex) => {
        
            const div = document.createElement("div");
        
            // Matches Played
            if (columnIndex === 2) {
        
                div.dataset.target = Number(cell);
                div.textContent = "0";
        
            }
        
            // Points
            else if (columnIndex === 3) {
        
                div.classList.add("points");
        
                div.dataset.target = Number(cell);
                div.textContent = "0";
        
            }
        
            // Game Differential
            else if (columnIndex === 4) {
        
                div.classList.add("diff");
        
                const value = Number(cell);
        
                if (value > 0) {
                    div.classList.add("positive");
                }
                else if (value < 0) {
                    div.classList.add("negative");
                }
                else {
                    div.classList.add("neutral");
                }
        
                div.dataset.target = value;
                div.dataset.diff = "true";
                div.textContent = "0";
        
            }
        
            // Place + Player
            else {
        
                div.textContent = cell;
        
            }
        
            rowDiv.appendChild(div);
        
        });

        renderedRows.push(rowDiv);



    }

    const elimCount = 3;

    const mainRows = renderedRows.slice(0, -elimCount);
    const elimRows = renderedRows.slice(-elimCount);

    mainRows.forEach(row => {
        main.appendChild(row);
    });

    const zoneTitle = document.createElement("div");
    zoneTitle.className = "zone-title";
    zoneTitle.textContent = "🔻 Stage 1 Elimination Zone";

    elimZone.appendChild(zoneTitle);

    elimRows.forEach(row => {

        row.classList.add("elim");
        elimZone.appendChild(row);

    });

    animateWaterfall();

});
</script>

</body>
</html>
